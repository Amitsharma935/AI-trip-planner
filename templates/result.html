<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Trip Plan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#6a11cb,#2575fc);
            min-height:100vh;
        }

        .result-card{
            background:white;
            border-radius:25px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.2);
        }

        .title{
            font-size:3rem;
            font-weight:bold;
            background: linear-gradient(90deg,#6a11cb,#ff4ecd);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .trip-content{
            white-space: pre-wrap;
            font-size:18px;
            line-height:1.8;
            color:#333;
        }

        .btn-custom{
            background:linear-gradient(90deg,#6a11cb,#ff4ecd);
            border:none;
            font-size:18px;
            font-weight:bold;
            padding:12px;
        }

        .btn-custom:hover{
            opacity:0.9;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="text-center mb-4">

        <h1 class="title">
            ✈️ Your AI Trip Plan
        </h1>

        <p class="text-white fs-5">
            Personalized itinerary generated by AI
        </p>

    </div>

    <div class="card result-card p-5">

        <div class="trip-content">

            {{ trip_plan }}

        </div>

        <hr>

        <a href="/"
           class="btn btn-custom text-white w-100">

            🔄 Plan Another Trip

        </a>

    </div>

</div>

</body>

</html>
