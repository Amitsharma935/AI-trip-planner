<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trip Planner</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#6a11cb,#2575fc);
            min-height:100vh;
        }

        .main-card{
            border-radius:25px;
            background:white;
            box-shadow:0px 10px 30px rgba(0,0,0,0.2);
        }

        .title{
            font-size:3rem;
            font-weight:bold;
            background: linear-gradient(90deg,#6a11cb,#ff4ecd);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .sub-title{
            color:#666;
        }

        .btn-custom{
            background:linear-gradient(90deg,#6a11cb,#ff4ecd);
            border:none;
            padding:12px;
            font-size:18px;
            font-weight:bold;
        }

        .btn-custom:hover{
            opacity:0.9;
        }

        .feature-card{
            border:none;
            border-radius:20px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .feature-card:hover{
            transform:translateY(-5px);
        }

    </style>
</head>

<body>

<div class="container py-5">

    <div class="text-center mb-4">

        <h1 class="title">
            ✈️ AI Trip Planner
        </h1>

        <p class="sub-title">
            Plan smarter. Travel better.
        </p>

    </div>

    <div class="card main-card p-5">

        <h3 class="mb-4">
            Plan Your Perfect Trip
        </h3>

        <form action="/generate" method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Starting City
                    </label>

                    <input type="text"
                           class="form-control form-control-lg"
                           name="source"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Destination
                    </label>

                    <input type="text"
                           class="form-control form-control-lg"
                           name="destination"
                           required>

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Budget (₹)
                    </label>

                    <input type="number"
                           class="form-control form-control-lg"
                           name="budget"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Number of Days
                    </label>

                    <input type="number"
                           class="form-control form-control-lg"
                           name="days"
                           required>

                </div>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Travel Style
                </label>

                <select class="form-select form-select-lg"
                        name="style">

                    <option>Budget</option>
                    <option>Adventure</option>
                    <option>Luxury</option>
                    <option>Family</option>

                </select>

            </div>

            <button class="btn btn-custom text-white w-100">
                Generate My Trip Plan
            </button>

        </form>

    </div>

    <div class="row mt-5">

        <div class="col-md-4">

            <div class="card feature-card p-3">
                <h5>🤖 AI Powered</h5>
                <p>Smart travel recommendations using AI.</p>
            </div>

        </div>

        <div class="col-md-4">

            <div class="card feature-card p-3">
                <h5>💰 Budget Friendly</h5>
                <p>Trips tailored to your budget.</p>
            </div>

        </div>

        <div class="col-md-4">

            <div class="card feature-card p-3">
                <h5>🗺️ Day Wise Plan</h5>
                <p>Complete itinerary for every day.</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
